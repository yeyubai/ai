services:
  mysql:
    image: mysql:8.4
    container_name: ai-weight-coach-mysql
    restart: unless-stopped
    env_file:
      - .env.mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    image: ${WEB_IMAGE:-ai-weight-coach-web:latest}
    container_name: ai-weight-coach-web
    restart: unless-stopped
    env_file:
      - .env.web
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: ${BACKEND_IMAGE:-ai-weight-coach-backend:latest}
    container_name: ai-weight-coach-backend
    restart: unless-stopped
    env_file:
      - .env.backend
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/v1/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql-data:
