name: 部署生产环境

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
      ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
      WEB_IMAGE_REPOSITORY: ${{ secrets.ACR_WEB_IMAGE_REPOSITORY }}
      BACKEND_IMAGE_REPOSITORY: ${{ secrets.ACR_BACKEND_IMAGE_REPOSITORY }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_API_BASE_URL }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
            backend/package-lock.json

      - name: 安装依赖
        run: |
          npm ci
          npm --prefix apps/web ci
          npm --prefix backend ci

      - name: 执行类型检查
        run: npm run typecheck

      - name: 执行测试
        run: npm run test

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: 构建并推送 web 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.WEB_IMAGE_REPOSITORY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}

      - name: 构建并推送 backend 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ github.sha }}

      - name: 启动 SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: 上传部署文件到 ECS
        shell: bash
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p /opt/ai-weight-coach"
          scp -P "${DEPLOY_PORT}" infra/docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/ai-weight-coach/docker-compose.prod.yml"
          scp -P "${DEPLOY_PORT}" infra/scripts/deploy.sh "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/ai-weight-coach/deploy.sh"

      - name: 在 ECS 上执行部署
        shell: bash
        run: |
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' -- \
            "${{ github.sha }}" \
            "${ACR_REGISTRY}" \
            "${ACR_USERNAME}" \
            "${ACR_PASSWORD}" \
            "${WEB_IMAGE_REPOSITORY}" \
            "${BACKEND_IMAGE_REPOSITORY}" <<'REMOTE'
          set -Eeuo pipefail
          IMAGE_TAG="$1"
          export ACR_REGISTRY="$2"
          export ALIYUN_ACR_USERNAME="$3"
          export ALIYUN_ACR_PASSWORD="$4"
          export WEB_IMAGE_REPOSITORY="$5"
          export BACKEND_IMAGE_REPOSITORY="$6"

          chmod +x /opt/ai-weight-coach/deploy.sh
          /opt/ai-weight-coach/deploy.sh "${IMAGE_TAG}"
          REMOTE
