<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AI Weight Coach</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(36, 211, 212, 0.14), transparent 48%),
          linear-gradient(180deg, #f5fbfc 0%, #eef5f8 100%);
        color: #163342;
      }

      main {
        max-width: 420px;
        padding: 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Weight Coach</h1>
      <p>
        Native shell is ready. Set <code>NATIVE_WEB_APP_URL</code> and run a
        Capacitor sync to load the real web app during internal testing.
      </p>
    </main>
  </body>
</html>
